# Image Adaptor V1.1 Training Configuration
# ===========================================
# Epipolar Cross-Attention + Fourier PE
# Single-stage training (no curriculum), depth as auxiliary loss
# No image reconstruction

data:
  physical_ai_root: /mnt/mydisk/alpamayo/data/physical_ai
  image_size: [320, 576]  # [H, W]
  max_clips: null          # null = use all clips, integer = limit for debugging

label_models:
  depth_model: depth-anything/Depth-Anything-V2-Metric-Outdoor-Small-hf
  vlm_model: Qwen/Qwen3-VL-2B-Instruct

model:
  backbone: efficientnet_b4
  backbone_pretrained: true
  backbone_out_channels: 256
  target_cameras:
    - front_wide
    - cross_left
    - cross_right

  pe:
    fourier_L: 10                # Fourier encoding frequency bands

  epipolar_attention:
    d_model: 256
    n_heads: 8
    n_layers: 3
    n_samples: 32                # points per epipolar line
    depth_range: [1.0, 60.0]
    ffn_dim: 1024
    dropout: 0.1

  token_decoder:
    in_channels: 256             # changed from 360 (V1)
    d_model: 512
    num_layers: 6
    num_heads: 8
    num_query_tokens: 180
    output_dim: 2048

training:
  total_epochs: 100
  batch_size: 2                  # per GPU
  lr: 1.0e-4
  weight_decay: 0.01
  warmup_epochs: 5
  grad_clip_norm: 1.0
  num_workers: 4
  seed: 42

checkpoint:
  save_every_n_epochs: 5
  log_image_every_n_epochs: 2
  checkpoint_dir: /mnt/mydisk/VLA_domain_adaptation/image_adaptor/checkpoints
  resume_from: null

loss_weights:
  # Main: Visual Tokens
  token_mse: 1.0
  token_cosine: 0.5
  token_attention_kl: 0.1
  # Auxiliary: Depth (at feature resolution 20x36)
  depth_l1: 0.1
  depth_silog: 0.05
